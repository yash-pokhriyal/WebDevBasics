<!-- Sementic Tags And Non Sementic tags  -->

<!-- Sementic tags | meaningful:describe content | SEO:good for search engine | Example :<header> <footer> <article> <section> <nav> -->

<!-- Non Sementic tags | no specific meaning | for styling : used for layouts  | Not seo friendly | Examples <div> <span>
<i>,<b> -->


<!-- Block and inline elements  -->

<!-- Block elements | starts on a new line | takes full width | styling : can have margin and padding | width and height can be set | Example <div> <p> <h1> <ul> <li> -->

<!-- Inline elements | stay in linw with text | just as wide as content | no new line between elements | cannot set size easily | Example <span> <a> <strong> <em> <img> -->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Structure</title>
</head>
<body>
    <!-- Header tag -->
    <header>

        <!-- navigation tag | encloses navigation links or menus -->
         <nav></nav>

    </header>
    <!-- Main tag | shoudl appear once per page -->
    <main>
        <!-- Section tag | group related content in a distinct section -->
        <section>

            <!-- div tags | acts as a container for html elements | commonly used for styling layout |highly versatile and can be customized using id and classes-->
             <div></div>

            <!-- Span tag | inline nature | commonly used for changing color font or adding effect via css   -->
             <span></span>


        </section>
        <section></section>

        <!-- article | encloses content that stands alone , like blog post or news story -->
        <article></article>

        <!-- aside tag | contains supplementary content | hold widget , quotes , ads -->
        <aside></aside>
        
    
    </main>

    <!-- footer tag | for footer content like extra info or links | typically at bottom of page or section | include copyright, contact info , social links , can be used more than once in a page -->

    <footer></footer>


</body>
</html>
