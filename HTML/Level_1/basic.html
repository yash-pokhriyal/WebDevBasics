<!-- HTML is a hypertext markup language . A skeleton of a website  -->

<!-- HTML tags : Elements that are used to create a website are called Html tags -->

<!-- Define elements like text , image ,links -->


<!-- ! Emmet to generate a boilerplate code  -->

<!-- Define version of html : HTML-5 -->
<!DOCTYPE html>

<!-- Parent of all HTML Tags/Root element -->
<html lang="en">

<!-- Parent of meta data tags | meta data : data of data -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title of WebPage -->
    <title>Basics Of HTML</title>
</head>

<!-- Parent of content tag -->
<body>

    <!-- Heading Tag -->
    <h1>Welcome To Basics Of HTML </h1>


</body>
</html>
