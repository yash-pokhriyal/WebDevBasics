<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Set</title>
    <style>
        #my-btn{
            height: 50px;
            width: 50px;
            font-size: 25px;
            border: none;
            border-radius: 5px;
        }
        .js-odd {
        background-color: chocolate;
        }
        .js-even {
        background-color: lawngreen;
        }
    </style>
</head>
<body>
    <h3 id="greeting"></h3>

    <button id="my-btn" onclick="buttonPressed()"></button>

    <script>

        let noOfTimeClicked = localStorage.getItem("noOfTimesClicked") || 0;

        function buttonPressed(){
            noOfTimeClicked++;
            localStorage.setItem("noOfTimesClicked",noOfTimeClicked);
            updateButton();
        }
        function updateButton(){
            let button = document.querySelector('#my-btn');
            if(noOfTimeClicked%2===0){
                button.classList.remove("js-odd");
                button.classList.add("js-even");
            }else{
                button.classList.remove("js-even");
                button.classList.add("js-odd");
                
            }
            button.innerText = noOfTimeClicked;
        }

        function doGreeting(personName ='dear'){
            let date = new Date()
            let hour = date.getHours();
             
            let heading = document.querySelector('#greeting');
            if(hour>5 && hour<12){
                heading.innerText = `Good Morning ${personName}`;
            }else if(hour>=12 && hour<18){
                heading.innerText = `Good AfterNoon ${personName}`;
            }else{
                heading.innerText = `Good Night ${personName}`;
            }
            
        }
        
        // doGreeting("Yash");
        // doGreeting("Birju");
        doGreeting();


    </script>
</body>
</html>


<!-- 1. Display good morning, afternoon and night based on
current hour.
2. Add the name to the output too.
3. Create a Button which shows the number how many times
it has been pressed.
4• Also, it has different colors for when it has been pressed
odd or even times.
5• The click count should also survive browser refresh. -->
