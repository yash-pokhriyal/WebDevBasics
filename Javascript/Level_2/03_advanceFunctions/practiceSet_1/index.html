<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Set</title>
    <style>
        .btn-subscribe{
            font-size: 15px;
            height: 20px;
            width: 80px;
            background-color: rgb(217,17,17);
            color: white;
            border: none;
            border-radius: 4px;
        }
        .js-size-double{
           font-size: 30px;
           height: 40px;
           width: 160px;
        }
    </style>
</head>
<body>
      <button class="btn-subscribe">Subscribe</button>
      <script>
          function doubleSize(){
            let buttonElement = document.querySelector('.btn-subscribe')
            buttonElement.classList.add('js-size-double')
           }

          let buttonElement = document.querySelector('.btn-subscribe')
          buttonElement.addEventListener('click',event=>{
                setTimeout(doubleSize,2000)
            })
      </script>
</body>
</html>


<!-- 
1.Create a button which should grow double in size on
clicking after 2 seconds. -->
