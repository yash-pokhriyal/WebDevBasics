<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numbers And Strings</title>
</head>
<body>
    <script>
    //    Variables are like containers used to store data values
    let welcomeMsg = 'hello world';
    console.log(welcomeMsg);

    let $hello = 'raja';
    console.log($hello);

    // cannot use keyword as variables .
    // cannot start with number .
    // cannot use special character except $ and _
    // = for assignment
    
    // Updating values
    let noOfStudents = 5;

    // noOfStudents = noOfStudents +5
    noOfStudents+=5;
    console.log(noOfStudents);  //10

    noOfStudents-=2
    // noOfStudents = noOfStudents -2
    console.log(noOfStudents); //8

    noOfStudents*=2
    console.log(noOfStudents) //16

    noOfStudents/=2
    console.log(noOfStudents) //8

    noOfStudents%=3
    console.log(noOfStudents) //2
    
    let money = 1
    money++;
    console.log('Value of money',money);

    // const 
    const pi = 3.14
    console.log(pi)

    // cannot update this value ;

    // Strings 
    let name = 'Yash Pokhriyal';
    console.log('Hello my name is',name);

    // concatenate
    let str1 = 'String 1';
    let str2 = 'String 2';
    console.log(str1+str2);

    let num1 = 2;
    let num2 = 3;
    console.log(num1+num2);

    // Adding a string and a number
    console.log(str1+num1); //String 12 It concatenate the 2 with String1



    </script>
</body>
</html>
