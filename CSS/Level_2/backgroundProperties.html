<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color system and Background Property</title>
    <style>
        /* Color and background color property */
       .first{
        color: rgb(220, 41, 41);
        background-color: antiquewhite;
       }
       .second{
        color: blue;
        background-color: rgb(214, 90, 90);
       }
       button{
        color: azure;
        background-color: rgb(19, 192, 192);
       }

       /* Height and width */
       .box{
        height: 40px;
        width: 40px;
       }

       #box1{
        background-color: aqua;
       }
       #box2{
        background-color: antiquewhite;
       }
       #box3{
        background-color: rgb(125, 125, 212);
       }
       
       /* background image */
       *{
        background-image: url(img.webp);
        background-repeat: no-repeat;
        background-size: cover;
        /* sets baground image scroll with element or fixed */
        background-attachment: fixed;
        background-position: center;

        /* shorthand for baground properties : cirap */
        background: wheat url(img.webp) no-repeat fixed center;

       }

       /* visibility : controls visibility of elements without changing layout */
       #box1{
        visibility: hidden;
       }


      


    </style>
</head>
<body>
    <div class="first">
       First
    </div>
    <div class="second">
       Second
    </div>
    <button>Click Me</button>
    <div id="box1" class="box">
      Box1
    </div>
    <div id="box2" class="box">
      Box2
    </div>
    <div  id="box3" class="box">
      Box3
    </div>
</body>
</html>
