<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid </title>
    <style>
        .container{
            display: grid;
            grid-template-columns: 50px 50px;
            grid-template-rows: 100px 100px;
        }
        .item1{
          grid-column: 1/2;
          grid-row: 1/2;
          background-color: aqua;
        }
        .item2{
          grid-column: 2/2;
          grid-row: 1/2;
          background-color: rgb(98, 175, 175);
        }
        .item3{
          grid-column: 1/2;
          grid-row: 2/2;
          background-color: rgb(8, 73, 73);
        }
        .item4{
          grid-column: 2/2;
          grid-row: 2/2;
          background-color: rgb(14, 16, 16);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item1">Item1</div>
        <div class="item2">Item2</div>
        <div class="item3">Item3</div>
        <div class="item4">Item4</div>
    </div>
</body>
</html>
