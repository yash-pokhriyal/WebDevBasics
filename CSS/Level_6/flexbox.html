<head>

        .container{
            border: 2px solid black;
            height: 400px;
            display: flex;

            /* flex direction */
            flex-direction: column;
            flex-direction: row-reverse;

            /* automatic shrink | flex wrap:nowrap*/
            /* width: 200px; */

            /* justify content */
            justify-content: space-between;
            justify-content: center;

            /* flex wrap */
            /* width: 200px;
            flex-wrap: wrap; */
            /* is se next line me aagya agar ni lgata to vhi shrink hota */

            align-items: center;

            align-content: space-around;



        }
        .box{
            height: 100px;
        
            width: 100px;
        }
        #box1{
            background-color: red;
            order:1;
            
        }
        #box2{
            background-color: yellow;
            order: 3;
            
        } 
        #box3{
            background-color: gray;
            order: 2;
        }
        #box4{
            background-color: rgb(218, 218, 47);
            /* individual flex items to override container align items property aligning them differently along the cross axis */
            align-self: start;
            flex-shrink: 4;
            /* jab shrink ho to ye 4 guna jyada shrink ho sbse */

            flex-grow: 2;
            /* additional space case how much flex ite, will grow */
            
            order: 4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box" id="box1">
            Box1
        </div>
        <div class="box" id="box2">
            Box2
        </div>
        <div class="box" id="box3">
            Box3
        </div>
        <div class="box" id="box4">
            Box4
        </div>
    
    </div>
</body>
