<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media query</title>
    <style>
        .box{
            height: 100px;
            width: 100px;
            background-color: lightcoral;
        }
        @media (min-width:400px) and (max-width:800px){
            .box{
                border: 5px solid red;
            }
        }
    </style>
</head>
<body>
    <div class="box">
        Box1
    </div>

  
</body>
</html>
